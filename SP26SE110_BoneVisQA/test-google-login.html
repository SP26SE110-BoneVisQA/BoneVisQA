<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Test Google Login - BoneVisQA</title>
</head>
<body>
    <h2>Test Google Login (BE only)</h2>
    <p>Mở file này từ <strong>http://localhost:3000</strong> hoặc serve bằng Live Server.</p>
    <div id="buttonDiv"></div>
    <pre id="result" style="background:#f5f5f5;padding:10px;margin-top:10px;max-width:600px;overflow:auto;word-break:break-all;"></pre>

    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script>
        const API_URL = "http://localhost:5046";
        const CLIENT_ID = "460789969186-if6h5nar0bsno6rr5vpn4q7ovgie77be.apps.googleusercontent.com";

        function handleCredential(response) {
            const idToken = response.credential;
            document.getElementById("result").textContent = "ID Token (đã copy vào clipboard):\n" + idToken;

            navigator.clipboard?.writeText(idToken);
            alert("ID Token đã copy! Đang gửi lên API...");

            fetch(API_URL + "/api/auths/google-login", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ idToken })
            })
            .then(r => r.json())
            .then(data => {
                const msg = data.success 
                    ? "Đăng nhập thành công!\nToken JWT: " + (data.token || "").substring(0, 50) + "..."
                    : "Lỗi: " + data.message;
                document.getElementById("result").textContent += "\n\n--- API Response ---\n" + JSON.stringify(data, null, 2);
                alert(msg);
            })
            .catch(err => {
                document.getElementById("result").textContent += "\n\nLỗi: " + err.message;
                alert("Lỗi gọi API: " + err.message + "\n\nKiểm tra API đang chạy tại " + API_URL);
            });
        }

        window.onload = function() {
            google.accounts.id.initialize({
                client_id: CLIENT_ID,
                callback: handleCredential
            });
            google.accounts.id.renderButton(
                document.getElementById("buttonDiv"),
                { theme: "outline", size: "large", text: "signin_with", shape: "rectangular" }
            );
        };
    </script>
</body>
</html>
